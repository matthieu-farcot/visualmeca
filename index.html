<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="./scripts/nice.js"></script>
    <script>
    if (window.AFRAME && AFRAME.THREE) {
      window.THREE = AFRAME.THREE;
    }
    </script>
  </head>
  <body>
    <a-scene>
      <a-camera position="0 2 0"></a-camera>
      <a-sky id"map" src="./images/puydesancy.jpg"></a-sky>
<a-text value="Atelier positionnement des vues" position="-1.5194 2.56002 -0.60274"></a-text>


      <a-entity id="CoupeBB" position="-0.92471 1.75 -0.604" <!--cycle-piston --> >

    <a-image src="./images/position.png"
             scale="0.866 1.18 1"
             position="-0.005 -0.005 0"
             material="opacity:0.75">
    </a-image>

    <a-entity id="piston">

        <!-- Partie fixe -->
        <a-entity id="pistond"
                  gltf-model="./objets/piston.glb"
                  position="-0.23316 0.2834 -0.00158"
                  rotation="0 -90 0"
                  scale="0.09 0.09 0.09">
        </a-entity>

        <!-- Partie mobile -->
        <a-entity id="pistonmobile">

            <a-entity id="pistong"
                      gltf-model="./objets/piston.glb"
                      position="-0.17018 0.2834 -0.002"
                      rotation="0 90 0"
                      scale="0.09 0.09 0.09">
            </a-entity>

        </a-entity>

    </a-entity>

</a-entity>


<a-entity id="moteur" position="0 1.87325 0.78706">
        <a-text value="Atelier Moteur Oscillant" position="1.16652 0.7855 -0.20994" rotation="0 180 0"></a-text>
        <a-light type="point" color="white" position="0 5 0"></a-light>
        <a-image id="moteur-coupe" src="./images/moteur.png" position="0 0.216 -0.168" rotation="0 180 0"></a-image>
  <a-entity id="piston" position="0 -0.49972 -0.3689">
      <a-entity id="bras1" gltf-model="./objets/bras1.glb" position="0 0.07523 0" scale="100 100 100" rotation="0 0 96.12" animation="dur: 1000; easing: linear; loop: true; property: rotation; to: 0 0 190; dir: alternate"></a-entity>
        <a-entity id="bras2" gltf-model="./objets/bras2.glb" position="0.02 0 0" scale="100 100 100" rotation="" animation="dur: 1000; easing: linear; loop: true; property: position; to: -0.03 0 0; dir: alternate"></a-entity>
        <a-entity id="corps" gltf-model="./objets/brasvide.glb" position="" scale="100 100 100" rotation=""></a-entity>
      </a-entity>
    </a-entity>
      
    </a-scene>
  </body>
</html>
